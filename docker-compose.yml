services:
  mealie-parser:
    build:
      context: .
    image: mealie-parser:latest
    container_name: mealie-parser
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUN_MODE: once
      RUN_INTERVAL_SECONDS: 21600
    volumes:
      - ./reports:/app/reports
    extra_hosts:
      - "host.docker.internal:host-gateway"
